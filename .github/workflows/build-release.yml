name: .NET

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  Create_Speedseat_Release:
    runs-on: ubuntu-latest  
    
    steps:
    - uses: actions/checkout@v4 

    - name: Use Node.js
      uses: actions/setup-node@v4 
      with:
        node-version: 20.x # Or 22.x. Stop using 16.
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm ci --force
        npm run build --if-present

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x 
        
    - name: Build Backend
      run: |
        cd backend
        dotnet restore
        dotnet build --no-restore
        dotnet publish -c Release -o publish -p:PublishReadyToRun=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --self-contained true -r win-x64
   
    - name: Changelog
      uses: scottbrenner/generate-changelog-action@master
      with:
        package-dir: 'frontend/package.json'
        allow-unknown: true
      id: Changelog
      env:
        REPO: ${{ github.repository }}
        
    - name: Create Release and Upload Artifact
      uses: softprops/action-gh-release@v2 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        body: ${{ steps.Changelog.outputs.changelog }}
        draft: false
        prerelease: false
        files: ./backend/publish/speedseat.exe
