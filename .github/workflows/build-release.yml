name: Build & Release

# Every push to main produces a new GitHub release containing the single-file
# backend exe (with frontend + matching ESP32 firmware embedded) and the
# firmware.bin as a separate asset for manual USB flashing.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Create_Speedseat_Release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Backend version (4-part, must sort above the old 0.1.x tags).
      VERSION: 0.2.${{ github.run_number }}.0
      # Numeric firmware version used in the version handshake (16 bit).
      FW_VERSION: ${{ github.run_number }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm ci --force
        npm run build --if-present

    - name: Build Firmware
      run: |
        pip install platformio
        cd microcontroller
        PLATFORMIO_BUILD_FLAGS="-DFW_VERSION_NUMBER=${FW_VERSION}" pio run
        cp .pio/build/az-delivery-devkit-v4/firmware.bin ../backend/firmware.bin
        printf '%s' "${FW_VERSION}" > ../backend/firmware_version.txt

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Backend
      run: |
        cd backend
        dotnet restore
        dotnet publish -c Release -o publish -p:Version=${VERSION} -p:PublishReadyToRun=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --self-contained true -r win-x64

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ./backend/publish/speedseat.exe
          ./backend/firmware.bin
